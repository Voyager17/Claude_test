  <!-- film strip body -->
  <rect x="5" y="8" width="22" height="16" rx="2" fill="#3b82f6"/>
  <!-- left sprocket holes -->
  <rect x="5" y="10" width="3" height="3" rx="1" fill="#0f172a"/>
  <rect x="5" y="15" width="3" height="3" rx="1" fill="#0f172a"/>
